[profile.default]

# Imports use paths like `src/...` and `test/...`; map them into contracts/
remappings = [
    "src/=contracts/src/",
    "test/=contracts/test/",
    "script/=contracts/script/",
    "lib/=contracts/lib/",
]

cache = true

cache_path = 'cache'
evm_version = 'cancun'

names = false
offline = false
optimizer = true
optimizer_runs = 200
via_ir = true
out = 'out'
src = 'contracts/src'
script = 'contracts/script'
test = 'contracts/test'
libs = ['contracts/lib']

# Allow scripts to write deployment addresses for the frontend
fs_permissions = [{ access = "read-write", path = "./contracts" }]

[profile.sepolia]
test = "contracts/test/sepolia"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }