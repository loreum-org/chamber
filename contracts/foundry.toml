[profile.default]

cache = true

cache_path = 'cache'
evm_version = 'cancun'

optimizer = true
optimizer_runs = 200
solc_version = "0.8.30"
via_ir = true
out = 'out'
src = 'src'
script = 'script'
test = 'test'
libs = ['lib']

# Allow scripts to write deployment artifacts under this crate (e.g. deployments.json)
fs_permissions = [{ access = "read-write", path = "." }]

[profile.sepolia]
test = "test/sepolia"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
